<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C9A84C">
<meta name="color-scheme" content="light">
<style>:root { color-scheme: light only; }</style>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Планер">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Мой планер</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
:root {
  /* Light: серо-голубой фон, янтарный хедер, лавандовые акценты, золото активное */
  --bg: #dde6f0;
  --surface: #eef3f8;
  --surface2: #e4edf5;
  --border: rgba(90,110,140,0.15);
  --border2: rgba(90,110,140,0.28);
  --text: #2c2e33;
  --text-muted: #6b7280;
  --text-hint: #a0aab4;

  --header-bg: #C9A84C;
  --header-text: #ffffff;
  --header-btn-bg: rgba(255,255,255,0.22);

  --accent: #8B7CC8;
  --accent-light: #ede9f8;
  --accent-border: #b8aee0;

  --gold: #D4A017;
  --gold-light: #fdf3d7;
  --gold-border: #e6c96a;

  --tag-rem-bg: #fdf3d7; --tag-rem-text: #92600a;
  --tag-rep-bg: #e8f5e9; --tag-rep-text: #2e7d32;
}
/* Dark mode intentionally disabled — fixed light theme */

#app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); padding-bottom: 80px; }

/* Header */
.topbar { background: var(--header-bg); padding: 16px 16px 14px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
.topbar-row { display: flex; align-items: center; justify-content: space-between; }
.app-title { font-size: 20px; font-weight: 700; color: var(--header-text); letter-spacing: -0.3px; }
.month-nav { display: flex; align-items: center; gap: 6px; }
.nav-btn { background: var(--header-btn-bg); border: none; border-radius: 10px; width: 32px; height: 32px; cursor: pointer; font-size: 17px; color: var(--header-text); display: flex; align-items: center; justify-content: center; }
.nav-btn:active { opacity: 0.7; }
.month-label { font-size: 14px; font-weight: 600; color: var(--header-text); min-width: 115px; text-align: center; opacity: 0.95; }

/* Calendar */
.calendar-wrap { padding: 10px 10px 0; }
.weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 3px; }
.weekday { text-align: center; font-size: 10px; color: var(--text-hint); padding: 4px 0; font-weight: 700; letter-spacing: 0.3px; }
.calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.day-cell { border-radius: 10px; padding: 3px 1px; min-height: 54px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; display: flex; flex-direction: column; align-items: center; background: var(--surface); }
.day-cell:active { transform: scale(0.93); }
.day-cell.other-month { opacity: 0.2; background: transparent; pointer-events: none; }
.day-cell.today .day-num { background: var(--gold); color: white; border-radius: 50%; }
.day-cell.has-tasks { border-color: var(--accent-border); background: var(--accent-light); }
.day-num { font-size: 12px; font-weight: 600; color: var(--text); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 1px; }
.day-emojis { font-size: 9px; line-height: 1.4; text-align: center; word-break: break-all; padding: 0 1px; }

/* Tab bar */
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 20; }
.tab-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-hint); font-size: 10px; transition: color 0.15s; }
.tab-btn.active { color: var(--gold); }
.tab-icon { font-size: 20px; line-height: 1; }

/* Sheets */
.backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.backdrop.open { opacity: 1; pointer-events: all; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; max-width: 430px; margin: 0 auto; background: var(--surface); border-radius: 22px 22px 0 0; z-index: 51; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height: 90vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 38px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 10px; flex-shrink: 0; border-bottom: 0.5px solid var(--border); }
.sheet-title { font-size: 17px; font-weight: 700; color: var(--text); }
.close-btn { background: var(--surface2); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
.sheet-body { overflow-y: auto; flex: 1; padding: 0 16px; }

/* Task list */
.task-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.task-item:last-child { border-bottom: none; }
.task-check { width: 22px; height: 22px; border: 1.5px solid var(--accent-border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: none; margin-top: 1px; transition: all 0.15s; font-size: 13px; color: white; }
.task-check.done { background: var(--accent); border-color: var(--accent); }
.task-content { flex: 1; min-width: 0; }
.task-name { font-size: 15px; color: var(--text); }
.task-name.done { text-decoration: line-through; color: var(--text-hint); }
.task-meta { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.tag-reminder { background: var(--tag-rem-bg); color: var(--tag-rem-text); }
.tag-repeat { background: var(--tag-rep-bg); color: var(--tag-rep-text); }
.task-actions { display: flex; gap: 2px; flex-shrink: 0; }
.task-edit-btn { background: none; border: none; color: var(--text-hint); cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1; }
.task-edit-btn:hover { color: var(--gold); }
.task-delete { background: none; border: none; color: var(--text-hint); cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; }
.task-delete:hover { color: #e05555; }

/* Inline edit */
.task-edit-form { display: flex; gap: 6px; padding: 6px 0; align-items: center; }
.task-edit-input { flex: 1; padding: 7px 10px; border: 1px solid var(--accent-border); border-radius: 10px; font-size: 14px; background: var(--surface2); color: var(--text); outline: none; }
.task-edit-save { padding: 7px 12px; background: var(--gold); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.task-edit-cancel { padding: 7px 10px; background: var(--surface2); color: var(--text-muted); border: none; border-radius: 10px; font-size: 13px; cursor: pointer; }

/* Add form */
.add-form { border-top: 0.5px solid var(--border); padding: 12px 16px 10px; flex-shrink: 0; }
.task-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border2); border-radius: 12px; font-size: 15px; background: var(--surface2); color: var(--text); outline: none; margin-bottom: 10px; }
.task-input:focus { border-color: var(--accent-border); background: var(--surface); }
.emoji-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
.emoji-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 5px 6px; cursor: pointer; font-size: 17px; transition: all 0.1s; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
.emoji-btn.selected { border-color: var(--gold); background: var(--gold-light); transform: scale(1.15); box-shadow: 0 0 0 2px var(--gold-border); }
.cube-btn { width: 31px; height: 31px; }
.custom-emoji-input { width: 42px; padding: 5px 4px; border: 1px solid var(--border2); border-radius: 10px; font-size: 17px; text-align: center; background: var(--surface2); color: var(--text); outline: none; }
.reminder-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.reminder-row label { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.reminder-row input[type="time"] { border: 1px solid var(--border2); border-radius: 10px; padding: 6px 10px; font-size: 13px; background: var(--surface2); color: var(--text); outline: none; }
.repeat-section { background: var(--surface2); border-radius: 12px; padding: 10px 12px; margin-bottom: 10px; border: 1px solid var(--border); }
.repeat-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text); font-weight: 500; }
.repeat-body { margin-top: 10px; display: none; }
.repeat-body.open { display: block; }
.repeat-type-row { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
.rtype-btn { padding: 5px 11px; border: 1px solid var(--border2); border-radius: 20px; background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; }
.rtype-btn.sel { background: var(--accent); border-color: var(--accent); color: white; }
.days-row { display: flex; gap: 4px; margin-bottom: 8px; }
.day-tog { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.day-tog.on { background: var(--accent); border-color: var(--accent); color: white; }
.repeat-until { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.repeat-until input[type="date"] { border: 1px solid var(--border2); border-radius: 8px; padding: 4px 8px; font-size: 12px; background: var(--surface); color: var(--text); outline: none; }
.add-btn { width: 100%; padding: 13px; background: var(--gold); color: white; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.2px; }
.add-btn:active { opacity: 0.85; transform: scale(0.98); }
.empty-msg { font-size: 14px; color: var(--text-hint); text-align: center; padding: 20px 0 8px; }
.rec-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.rec-item:last-child { border-bottom: none; }
.rec-info { flex: 1; }
.rec-name { font-size: 14px; font-weight: 500; color: var(--text); }
.rec-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="app-title">✦ планер</div>
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>

      </div>

  </div>
  <div class="calendar-wrap">
    <div class="weekdays">
      <div class="weekday">пн</div><div class="weekday">вт</div><div class="weekday">ср</div>

</div>

<div class="tabbar">

<!-- Day sheet -->
<div class="sheet" id="daySheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="sheetTitle"></span>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="close-btn" title="Экспорт в календарь" onclick="exportICS()" style="font-size:14px;">📆</button>

      <button class="emoji-btn" data-e="📚" onclick="pe(this)">📚</button>
      <button class="emoji-btn" data-e="🌿" onclick="pe(this)">🌿</button>
      <button class="emoji-btn" data-e="⭐" onclick="pe(this)">⭐</button>
      <button class="emoji-btn" data-e="🤖" onclick="pe(this)">🤖</button>
      <button class="emoji-btn" data-e="🦋" onclick="pe(this)">🦋</button>
      <button class="emoji-btn" data-e="🩵" onclick="pe(this)">🩵</button>
      <button class="emoji-btn" data-e="🎬" onclick="pe(this)">🎬</button>
      <button class="emoji-btn" data-e="🖼️" onclick="pe(this)">🖼️</button>
      <button class="emoji-btn" data-e="🦷" onclick="pe(this)">🦷</button>
      <button class="emoji-btn" data-e="🔴" onclick="pe(this)">🔴</button>
      <button class="emoji-btn" data-e="🟠" onclick="pe(this)">🟠</button>
      <button class="emoji-btn" data-e="🟡" onclick="pe(this)">🟡</button>
      <button class="emoji-btn" data-e="🟢" onclick="pe(this)">🟢</button>
      <button class="emoji-btn" data-e="🔵" onclick="pe(this)">🔵</button>
      <button class="emoji-btn" data-e="🟣" onclick="pe(this)">🟣</button>
      <button class="emoji-btn" data-e="🟤" onclick="pe(this)">🟤</button>
      <button class="emoji-btn" data-e="🧊" onclick="pe(this)">🧊</button>

<!-- Recurring sheet -->
<div class="sheet" id="recSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Регулярные задачи</span>
    <button class="close-btn" onclick="closeRec()">×</button>
  </div>
  <div class="sheet-body" id="recList"></div>

<script>
const MN=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MG=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DL=['вс','пн','вт','ср','чт','пт','сб'];
let cY,cM,selDate,selE='',rType='weekly',rDates=[],activeSheet=null,editIdx=null;
let tasks={},recurring=[];

function renderEmoji(e){if(!e)return'';return e;}

function load(){try{tasks=JSON.parse(localStorage.getItem('pl_t')||'{}');}catch(e){tasks={};}try{recurring=JSON.parse(localStorage.getItem('pl_r')||'[]');}catch(e){recurring=[];}}
function save(){localStorage.setItem('pl_t',JSON.stringify(tasks));localStorage.setItem('pl_r',JSON.stringify(recurring));}
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function pdk(k){const[y,m,d]=k.split('-');return{y:+y,m:+m-1,d:+d};}

function recForDate(key){
  const{y,m,d}=pdk(key);const dt=new Date(y,m,d);const dow=dt.getDay();
  return recurring.filter(r=>{
    if(localStorage.getItem(`skip_${r.id}_${key}`))return false;
    if(r.until&&dt>new Date(r.until))return false;
    if(r.type==='daily')return true;
    if(r.type==='weekly')return(r.days||[]).includes(dow);
    if(r.type==='dates')return(r.dates||[]).includes(key);
    return false;
  });
}

function allFor(key){
  const man=tasks[key]||[];
  const rec=recForDate(key).map(r=>{
    const dk2=`rd_${r.id}_${key}`;
    return{name:r.name,emoji:r.emoji,done:!!localStorage.getItem(dk2),reminder:r.reminder,isRec:true,rid:r.id,dk:dk2};
  });
  return[...man,...rec];
}

function init(){load();const n=new Date();cY=n.getFullYear();cM=n.getMonth();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});}

function changeMonth(dir){cM+=dir;if(cM>11){cM=0;cY++;}if(cM<0){cM=11;cY--;}render();}

function render(){
  document.getElementById('monthLabel').textContent=MN[cM]+' '+cY;
  const cal=document.getElementById('calendar');cal.innerHTML='';
  const now=new Date();const first=new Date(cY,cM,1);
  let dow=first.getDay();if(dow===0)dow=7;
  const dim=new Date(cY,cM+1,0).getDate();const dip=new Date(cY,cM,0).getDate();
  for(let i=0;i<42;i++){
    let day,y=cY,m=cM,other=false;
    if(i<dow-1){day=dip-(dow-2-i);m=cM-1;if(m<0){m=11;y--;}other=true;}
    else if(i>=dow-1+dim){day=i-(dow-1+dim)+1;m=cM+1;if(m>11){m=0;y++;}other=true;}
    else{day=i-dow+2;}
    const key=dk(y,m,day);const all=allFor(key);
    const isToday=!other&&day===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
    const pend=all.filter(t=>!t.done).map(t=>t.emoji||'•').join('');
    const done=all.filter(t=>t.done).map(t=>t.emoji||'•').join('');
    const c=document.createElement('div');
    c.className='day-cell'+(other?' other-month':'')+(isToday?' today':'')+(all.length?' has-tasks':'');
    c.innerHTML=`<div class="day-num">${day}</div><div class="day-emojis">${pend}${done?'<span style="opacity:0.35">'+done+'</span>':''}</div>`;
    if(!other)c.onclick=()=>openDay(y,m,day);
    cal.appendChild(c);
  }
}

function openDay(y,m,d){
  selDate=dk(y,m,d);editIdx=null;
  document.getElementById('sheetTitle').textContent=d+' '+MG[m];
  renderList();showSheet('daySheet');
}
function closeDay(){editIdx=null;hideSheet('daySheet');}

function renderList(){
  const list=document.getElementById('taskList');const all=allFor(selDate);
  if(!all.length){list.innerHTML='<div class="empty-msg">нет задач — добавь первую 🌿</div>';return;}
  list.innerHTML=all.map((t,i)=>{
    if(editIdx===i&&!t.isRec){
      return`<div class="task-edit-form">
        <input class="task-edit-input" id="editInp" value="${t.name.replace(/"/g,'&quot;')}"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          onkeydown="if(event.key==='Enter')saveEdit(${i});if(event.key==='Escape')cancelEdit();" />
        <button class="task-edit-save" onclick="saveEdit(${i})">✓</button>
        <button class="task-edit-cancel" onclick="cancelEdit()">✕</button>
      </div>`;
    }
    const recActions=t.isRec?`
      <button class="task-edit-btn" onclick="skipRec('${t.rid}')" style="font-size:11px;padding:3px 7px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);">пропустить</button>
      <button class="task-edit-btn" onclick="moveRec('${t.rid}','${t.name}','${t.emoji||''}')" style="font-size:11px;padding:3px 7px;border:1px solid var(--gold-border);border-radius:8px;background:var(--gold-light);color:var(--gold);">перенести</button>`:'';
    return`<div class="task-item">
      <button class="task-check ${t.done?'done':''}" onclick="tog(${i})">${t.done?'✓':''}</button>
      <div class="task-content">
        <div class="task-name ${t.done?'done':''}">${renderEmoji(t.emoji)} ${t.name}</div>
        <div class="task-meta">
          ${t.reminder?`<span class="tag tag-reminder">🔔 ${t.reminder}</span>`:''}
          ${t.isRec?`<span class="tag tag-repeat">🔁 регулярная</span>`:''}
        </div>
        ${t.isRec?`<div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;">${recActions}</div>`:''}
      </div>
      <div class="task-actions">
        ${!t.isRec?`<button class="task-edit-btn" onclick="startEdit(${i})" style="font-size:12px;padding:3px 7px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);">ред.</button>`:''}
        <button class="task-delete" onclick="del(${i})">×</button>
      </div>
    </div>`;
  }).join('');
  if(editIdx!==null){
    const inp=document.getElementById('editInp');
    if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  }
}

function startEdit(i){editIdx=i;renderList();}
function cancelEdit(){editIdx=null;renderList();}
function saveEdit(i){
  const inp=document.getElementById('editInp');if(!inp)return;
  const val=inp.value.trim();if(!val){cancelEdit();return;}
  const mi=allFor(selDate).slice(0,i).filter(x=>!x.isRec).length;
  if(tasks[selDate]&&tasks[selDate][mi])tasks[selDate][mi].name=val;
  save();editIdx=null;renderList();
}

function skipRec(rid){
  // mark this day as skipped for this recurring task
  localStorage.setItem(`skip_${rid}_${selDate}`,'1');
  render();renderList();
}

function moveRec(rid,name,emoji){
  const dateStr=prompt('Перенести на дату (гггг-мм-дд):',getNextDay(selDate));
  if(!dateStr||!dateStr.match(/^\d{4}-\d{2}-\d{2}$/))return;
  // skip today
  localStorage.setItem(`skip_${rid}_${selDate}`,'1');
  // add as manual task on target date
  if(!tasks[dateStr])tasks[dateStr]=[];
  tasks[dateStr].push({name,emoji:emoji||'📌',done:false,reminder:null});
  save();render();renderList();
}

function getNextDay(key){
  const{y,m,d}=pdk(key);const dt=new Date(y,m,d+1);
  return dk(dt.getFullYear(),dt.getMonth(),dt.getDate());
}

function tog(i){
  const all=allFor(selDate);const t=all[i];
  if(t.isRec){if(t.done)localStorage.removeItem(t.dk);else localStorage.setItem(t.dk,'1');}
  else{const mi=all.slice(0,i).filter(x=>!x.isRec).length;if(tasks[selDate]&&tasks[selDate][mi])tasks[selDate][mi].done=!tasks[selDate][mi].done;save();}
  render();renderList();
}

function del(i){
  const all=allFor(selDate);const t=all[i];editIdx=null;
  if(t.isRec){if(confirm('Удалить регулярную задачу полностью?')){recurring=recurring.filter(r=>r.id!==t.rid);save();}}
  else{const mi=all.slice(0,i).filter(x=>!x.isRec).length;if(tasks[selDate]){tasks[selDate].splice(mi,1);if(!tasks[selDate].length)delete tasks[selDate];}save();}
  render();renderList();
}

function pe(btn){document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selE=btn.dataset.e;document.getElementById('customEmoji').value='';}

function toggleRepeat(){const cb=document.getElementById('repeatCheck');cb.checked=!cb.checked;document.getElementById('repeatBody').classList.toggle('open',cb.checked);}
function prt(btn){document.querySelectorAll('.rtype-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');rType=btn.dataset.t;document.getElementById('daysRow').style.display=rType==='weekly'?'flex':'none';document.getElementById('datesPicker').style.display=rType==='dates'?'block':'none';}
function addRD(){const v=document.getElementById('dpInput').value;if(!v||rDates.includes(v))return;rDates.push(v);renderRD();}
function remRD(d){rDates=rDates.filter(x=>x!==d);renderRD();}
function renderRD(){document.getElementById('rdList').innerHTML=rDates.map(d=>`<span style="background:var(--accent-light);color:var(--accent);border-radius:20px;padding:2px 8px;font-size:11px;display:inline-flex;align-items:center;gap:4px;">${d}<button onclick="remRD('${d}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0;">×</button></span>`).join('');}

function addTask(){
  const inp=document.getElementById('taskInput');const name=inp.value.trim();if(!name)return;
  const custom=document.getElementById('customEmoji').value.trim();
  const emoji=custom||selE||'📌';
  const hasR=document.getElementById('reminderCheck').checked;
  const rtime=hasR?document.getElementById('reminderTime').value:null;
  const hasRep=document.getElementById('repeatCheck').checked;
  if(hasRep){
    const days=rType==='weekly'?[...document.querySelectorAll('.day-tog.on')].map(b=>+b.dataset.d):[];
    const until=document.getElementById('repeatUntil').value||null;
    const dates=rType==='dates'?[...rDates]:[];
    recurring.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),name,emoji,type:rType,days,dates,until,reminder:rtime});
  } else {
    if(!tasks[selDate])tasks[selDate]=[];
    tasks[selDate].push({name,emoji,done:false,reminder:rtime});
  }
  save();render();renderList();
  inp.value='';
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
  selE='';document.getElementById('customEmoji').value='';
  document.getElementById('reminderCheck').checked=false;
  document.getElementById('repeatCheck').checked=false;
  document.getElementById('repeatBody').classList.remove('open');
  document.querySelectorAll('.day-tog').forEach(b=>b.classList.remove('on'));
  rDates=[];renderRD();document.getElementById('repeatUntil').value='';
  inp.focus();
}

document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('customEmoji').addEventListener('input',function(){if(this.value){document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));selE=this.value;}});

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(t==='cal'?'tabCal':'tabRec').classList.add('active');
  if(t==='rec')openRec();
}

function openRec(){
  const list=document.getElementById('recList');
  if(!recurring.length){list.innerHTML='<div class="empty-msg">нет регулярных задач</div>';}
  else{list.innerHTML=recurring.map(r=>{
    let d='';
    if(r.type==='daily')d='каждый день';
    else if(r.type==='weekly')d='по: '+(r.days||[]).map(x=>DL[x]).join(', ');
    else if(r.type==='dates')d='даты: '+(r.dates||[]).join(', ');
    if(r.until)d+=' · до '+r.until;
    const eDisp=r.emoji||'📌';
    return`<div class="rec-item"><span style="font-size:22px;display:flex;align-items:center;">${eDisp}</span><div class="rec-info"><div class="rec-name">${r.name}</div><div class="rec-desc">${d}</div></div><button class="task-delete" onclick="delRec('${r.id}')">×</button></div>`;
  }).join('');}
  showSheet('recSheet');
}
function closeRec(){hideSheet('recSheet');document.getElementById('tabCal').classList.add('active');document.getElementById('tabRec').classList.remove('active');}
function delRec(id){recurring=recurring.filter(r=>r.id!==id);save();render();openRec();}

function showSheet(id){activeSheet=id;document.getElementById(id).classList.add('open');document.getElementById('backdrop').classList.add('open');}
function hideSheet(id){document.getElementById(id).classList.remove('open');document.getElementById('backdrop').classList.remove('open');activeSheet=null;}
function onBackdrop(){if(activeSheet==='daySheet')closeDay();else if(activeSheet==='recSheet')closeRec();}

function exportICS(){
  const all=allFor(selDate);
  if(!all.length){alert('Нет задач для экспорта');return;}
  const{y,m,d}=pdk(selDate);
  const pad=n=>String(n).padStart(2,'0');
  const dateStr=`${y}${pad(m+1)}${pad(d)}`;
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Планер//RU\r\nCALSCALE:GREGORIAN\r\n';
  all.forEach((t,i)=>{
    const uid=`planner-${selDate}-${i}@app`;
    const name=t.name.replace(/[\\;,]/g,'\\$&');
    const emoji=t.emoji?t.emoji+' ':'';
    let dtstart,dtend,alarm='';
    if(t.reminder){
      const[hh,mm]=t.reminder.split(':');
      dtstart=`${dateStr}T${hh}${mm}00`;
      const endH=String(+hh+(+mm+30>=60?1:0)).padStart(2,'0');
      const endM=String((+mm+30)%60).padStart(2,'0');
      dtend=`${dateStr}T${endH}${endM}00`;
      alarm=`BEGIN:VALARM\r\nTRIGGER:-PT0M\r\nACTION:DISPLAY\r\nDESCRIPTION:${emoji}${name}\r\nEND:VALARM\r\n`;
    } else {
      dtstart=dateStr; dtend=dateStr;
    }
    const dtProp=t.reminder?'DTSTART':'DTSTART;VALUE=DATE';
    const dteProp=t.reminder?'DTEND':'DTEND;VALUE=DATE';
    ics+=`BEGIN:VEVENT\r\nUID:${uid}\r\nSUMMARY:${emoji}${name}\r\n${dtProp}:${dtstart}\r\n${dteProp}:${dtend}\r\n${alarm}END:VEVENT\r\n`;
  });
  ics+='END:VCALENDAR';
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`planner-${selDate}.ics`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
}

init();
</script>
</body>
